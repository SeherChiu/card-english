<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡片英语</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #222230;
  --border: #2e2e3a;
  --text: #f0f0f4;
  --muted: #888899;
  --accent: #7c6ef7;
  --green: #43c59e;
  --yellow: #f7a541;
  --red: #ff6584;
}

body {
  font-family: 'Space Grotesk', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 24px 20px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

.logo-icon {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: linear-gradient(135deg, #6c63ff, #e47adb);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.sidebar-logo h1 { font-size: 16px; font-weight: 700; }

.sidebar-section {
  padding: 16px 12px 8px;
}

.sidebar-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 8px;
  margin-bottom: 6px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: 9px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  transition: all .15s;
  user-select: none;
  position: relative;
}

.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active { background: rgba(124,110,247,.15); color: var(--accent); }

.sidebar-item .count {
  margin-left: auto;
  font-size: 11px;
  background: var(--surface2);
  padding: 1px 7px;
  border-radius: 10px;
  color: var(--muted);
}

.sidebar-item.active .count {
  background: rgba(124,110,247,.2);
  color: var(--accent);
}

.folder-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.folder-actions {
  display: none;
  gap: 4px;
  margin-left: auto;
}

.sidebar-item:hover .folder-actions { display: flex; }
.sidebar-item:hover .count { display: none; }

.folder-action-btn {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: none;
  background: var(--surface);
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
}

.folder-action-btn:hover { background: var(--border); color: var(--text); }
.folder-action-btn.del:hover { background: rgba(255,101,132,.2); color: var(--red); }

.sidebar-add-folder {
  margin: 4px 12px 16px;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  border-radius: 9px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  width: calc(100% - 24px);
}

.sidebar-add-folder:hover { border-color: var(--accent); color: var(--accent); }

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ── TOPBAR ── */
.topbar {
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
  gap: 16px;
}

.topbar-left h2 { font-size: 18px; font-weight: 700; }
.topbar-left p { font-size: 12px; color: var(--muted); margin-top: 2px; }

.topbar-right { display: flex; align-items: center; gap: 10px; }

.filter-pills {
  display: flex;
  gap: 6px;
}

.pill {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.pill:hover { border-color: var(--accent); color: var(--text); }
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(124,110,247,.1); }

.btn-primary {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 9px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}

.btn-primary:hover { opacity: .88; transform: translateY(-1px); }
.btn-primary:active { transform: none; }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 18px;
  padding: 24px 32px 48px;
}

/* ── CARD ── */
.card-wrapper {
  perspective: 900px;
  height: 170px;
}

.card {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}

.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  border-radius: 15px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px;
  user-select: none;
  overflow: hidden;
}

.card-front {
  color: #fff;
}

.card-front::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 15px;
  background: radial-gradient(circle at 25% 25%, rgba(255,255,255,.18), transparent 65%);
  pointer-events: none;
}

.card-en {
  font-size: 24px; font-weight: 700;
  letter-spacing: -.5px; line-height: 1.2;
  text-align: center; word-break: break-word;
}

.card-phonetic {
  font-size: 12px; opacity: .72; margin-top: 5px;
  font-weight: 400; letter-spacing: .4px;
}

.card-hint {
  position: absolute; bottom: 10px; right: 12px;
  font-size: 10px; opacity: .5; font-weight: 500;
}

/* status badge on card */
.status-badge {
  position: absolute; top: 10px; left: 10px;
  display: flex; gap: 4px;
}

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  opacity: .85;
}

/* Status quick-toggle strip */
.status-strip {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  border-radius: 0 0 15px 15px;
  overflow: hidden;
  opacity: 0;
  transition: opacity .2s;
  height: 28px;
}

.card-wrapper:hover .status-strip { opacity: 1; }

.status-btn {
  flex: 1;
  border: none;
  background: rgba(0,0,0,.35);
  color: rgba(255,255,255,.85);
  font-family: inherit;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  letter-spacing: .3px;
  backdrop-filter: blur(4px);
}

.status-btn:hover { background: rgba(0,0,0,.55); }
.status-btn.s-new.cur    { background: rgba(91,200,245,.5); }
.status-btn.s-learning.cur { background: rgba(247,165,65,.5); }
.status-btn.s-known.cur  { background: rgba(67,197,158,.5); }

/* BACK face */
.card-back {
  transform: rotateY(180deg);
  background: #fff;
  color: #1a1a22;
}

.card-zh {
  font-size: 20px; font-weight: 700;
  text-align: center; line-height: 1.3;
  word-break: break-all;
}

.card-tag {
  font-size: 11px; color: #888; margin-top: 5px;
  font-weight: 500; text-transform: uppercase; letter-spacing: .8px;
}

.card-folder-label {
  position: absolute; top: 10px; left: 10px;
  font-size: 10px; color: #aaa; font-weight: 500;
}

/* ── INLINE EDIT ── */
.card-front .edit-overlay, .card-back .edit-overlay {
  display: none; flex-direction: column; align-items: center; gap: 7px; width: 100%;
}
.card-front.editing .edit-overlay { display: flex; }
.card-front.editing .card-display { display: none; }
.card-back.editing .edit-overlay { display: flex; }
.card-back.editing .card-display { display: none; }
.card-front .card-display, .card-back .card-display {
  display: flex; flex-direction: column; align-items: center; width: 100%;
}

.inline-input {
  width: 100%;
  background: rgba(255,255,255,.15);
  border: 1.5px solid rgba(255,255,255,.35);
  border-radius: 7px; padding: 5px 9px;
  color: #fff; font-family: inherit;
  font-size: 16px; font-weight: 600;
  text-align: center; outline: none;
}
.inline-input::placeholder { color: rgba(255,255,255,.45); }
.inline-input.sm { font-size: 12px; font-weight: 400; }
.inline-input-zh { background: rgba(0,0,0,.06); border-color: rgba(0,0,0,.18); color: #1a1a22; }
.inline-input-zh::placeholder { color: rgba(0,0,0,.3); }

.ph-row { position: relative; width: 100%; }
.ph-status {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: rgba(255,255,255,.7); pointer-events: none;
}

.save-btn {
  padding: 4px 14px; border-radius: 6px; border: none;
  background: rgba(255,255,255,.88); color: #1a1a22;
  font-family: inherit; font-size: 11px; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
.save-btn:hover { opacity: .8; }
.save-btn-zh { background: #1a1a22; color: #fff; }

/* ── CARD ACTIONS (top-right icons) ── */
.card-actions {
  position: absolute; top: 9px; right: 9px;
  display: flex; gap: 4px;
  opacity: 0; transition: opacity .2s; z-index: 10;
}
.card-wrapper:hover .card-actions { opacity: 1; }

.icon-btn {
  width: 24px; height: 24px; border-radius: 6px; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 12px;
  background: rgba(255,255,255,.2); color: #fff;
  backdrop-filter: blur(4px); transition: transform .1s;
}
.icon-btn:hover { transform: scale(1.1); }
.icon-btn.del { background: rgba(255,80,80,.28); }

/* ── ADD CARD ── */
.card-add {
  height: 170px; border-radius: 15px;
  border: 2px dashed var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 7px; cursor: pointer;
  color: var(--muted); font-size: 12px; font-weight: 500;
  transition: all .2s;
}
.card-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,110,247,.05); }
.card-add-icon { font-size: 26px; line-height: 1; }

/* ── EMPTY ── */
.empty {
  grid-column: 1/-1; text-align: center;
  padding: 60px 20px; color: var(--muted);
}
.empty p { margin-top: 8px; font-size: 13px; }

/* ── MODAL ── */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 28px;
  width: 360px; max-width: 95vw;
  animation: popIn .2s cubic-bezier(.4,0,.2,1);
  max-height: 90vh; overflow-y: auto;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(.94) translateY(8px); }
  to   { opacity: 1; transform: none; }
}

.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

.modal label {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .8px;
  margin-bottom: 5px; margin-top: 14px;
}
.modal label:first-of-type { margin-top: 0; }

.modal input, .modal select {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border); border-radius: 9px;
  padding: 9px 12px; color: var(--text);
  font-family: inherit; font-size: 14px; outline: none;
  transition: border-color .15s;
}
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal select option { background: var(--surface); }

.color-picker { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 4px; }
.color-swatch {
  width: 30px; height: 30px; border-radius: 8px;
  cursor: pointer; border: 2px solid transparent;
  transition: transform .1s, border-color .1s;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.selected { border-color: #fff; transform: scale(1.1); }

.modal-actions { display: flex; gap: 8px; margin-top: 22px; }

.btn-cancel {
  flex: 1; padding: 10px; border-radius: 9px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.btn-cancel:hover { color: var(--text); border-color: var(--text); }

.btn-confirm {
  flex: 2; padding: 10px; border-radius: 9px; border: none;
  background: var(--accent); color: #fff;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
.btn-confirm:hover { opacity: .88; }

/* ── FOLDER MODAL ── */
.folder-color-picker { display: flex; gap: 7px; margin-top: 4px; }
.folder-color-swatch {
  width: 26px; height: 26px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: transform .1s, border-color .1s;
}
.folder-color-swatch:hover { transform: scale(1.12); }
.folder-color-swatch.selected { border-color: #fff; transform: scale(1.12); }

/* ── BATCH MOVE MODAL ── */
.batch-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-top: 6px;
}
.batch-card-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--border);
  cursor: pointer; transition: all .15s;
  font-size: 12px; font-weight: 600;
}
.batch-card-item:hover { border-color: var(--accent); background: rgba(124,110,247,.08); }
.batch-card-item.selected { border-color: var(--accent); background: rgba(124,110,247,.15); }
.batch-card-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.batch-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.batch-btn {
  flex: 1; min-width: 80px;
  padding: 9px 12px; border-radius: 9px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-family: inherit;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.batch-btn:hover { color: var(--text); border-color: var(--text); }
.batch-btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.batch-btn.accent:hover { opacity: .88; }

.select-all-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.select-all-btn {
  font-size: 11px; color: var(--accent); font-weight: 600;
  cursor: pointer; background: none; border: none;
  font-family: inherit;
}

@media (max-width: 700px) {
  .sidebar { display: none; }
  .topbar { padding: 14px 16px; flex-wrap: wrap; }
  .grid { padding: 16px; gap: 12px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
}
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🃏</div>
    <h1>卡片英语</h1>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">视图</div>
    <div class="sidebar-item active" data-view="all" onclick="switchView('all', this)">
      <span>📚</span> 全部单词
      <span class="count" id="count-all">0</span>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">文件夹 <span style="float:right;font-size:9px;color:var(--muted);cursor:pointer;font-weight:400;text-transform:none;letter-spacing:0" onclick="openBatchModal()">批量整理</span></div>
    <div id="folder-list"></div>
  </div>

  <button class="sidebar-add-folder" onclick="openFolderModal()">
    <span style="font-size:15px">+</span> 新建文件夹
  </button>
</aside>

<!-- ── MAIN ── -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h2 id="view-title">全部单词</h2>
      <p id="view-sub">共 <b id="total-count">0</b> 张</p>
    </div>
    <div class="topbar-right">
      <div class="filter-pills">
        <button class="pill active" onclick="filterStatus('all',this)">全部</button>
        <button class="pill" onclick="filterStatus('new',this)">🔵 新词</button>
        <button class="pill" onclick="filterStatus('learning',this)">🟡 学习中</button>
        <button class="pill" onclick="filterStatus('known',this)">🟢 已掌握</button>
      </div>
      <button class="btn-primary" onclick="openAddModal()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        添加单词
      </button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</main>

<!-- ── ADD WORD MODAL ── -->
<div class="modal-backdrop" id="modal-add">
  <div class="modal">
    <h2>✏️ 添加单词</h2>
    <label>英文单词</label>
    <input id="m-en" type="text" placeholder="e.g. Serendipity" autocomplete="off" oninput="onWordInput()">
    <label>音标 <span id="ph-status" style="font-size:10px;font-weight:500;color:var(--muted);text-transform:none;letter-spacing:0"></span></label>
    <input id="m-ph" type="text" placeholder="输入单词后自动获取…" autocomplete="off">
    <label>中文释义</label>
    <input id="m-zh" type="text" placeholder="e.g. 意外发现美好事物的能力" autocomplete="off">
    <label>词性（可选）</label>
    <input id="m-tag" type="text" placeholder="e.g. n. / v. / adj." autocomplete="off">
    <label>文件夹</label>
    <select id="m-folder"></select>
    <label>卡片颜色</label>
    <div class="color-picker" id="color-picker"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-add')">取消</button>
      <button class="btn-confirm" onclick="addCard()">添加卡片</button>
    </div>
  </div>
</div>

<!-- ── FOLDER MODAL ── -->
<div class="modal-backdrop" id="modal-folder">
  <div class="modal">
    <h2 id="folder-modal-title">📁 新建文件夹</h2>
    <label>文件夹名称</label>
    <input id="f-name" type="text" placeholder="e.g. 2024年12月 / 商务英语" autocomplete="off">
    <label>颜色</label>
    <div class="folder-color-picker" id="folder-color-picker"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-folder')">取消</button>
      <button class="btn-confirm" id="folder-confirm-btn" onclick="confirmFolder()">创建</button>
    </div>
  </div>
</div>

<!-- ── BATCH MODAL ── -->
<div class="modal-backdrop" id="modal-batch">
  <div class="modal" style="width:480px">
    <h2>📦 批量整理单词</h2>
    <div class="select-all-row">
      <span style="font-size:13px;color:var(--muted)">选择要移动的单词</span>
      <button class="select-all-btn" onclick="toggleSelectAll()">全选 / 取消</button>
    </div>
    <div class="batch-grid" id="batch-grid"></div>
    <div style="margin-top:16px">
      <label style="display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">移动到文件夹</label>
      <select id="batch-target-folder" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none"></select>
    </div>
    <div class="batch-actions">
      <button class="batch-btn" onclick="closeModal('modal-batch')">取消</button>
      <button class="batch-btn accent" onclick="executeBatchMove()">移动所选单词</button>
    </div>
  </div>
</div>

<script>
// ── PALETTE ──
const COLORS = ['#6c63ff','#ff6584','#43c59e','#f7a541','#5bc8f5','#e47adb','#ff8c5a','#67d964'];
const FOLDER_COLORS = ['#6c63ff','#ff6584','#43c59e','#f7a541','#5bc8f5','#e47adb','#ff8c5a','#67d964','#aaa'];

const STATUS_COLORS = { new:'#5bc8f5', learning:'#f7a541', known:'#43c59e' };

// ── STORAGE ──
const STORAGE_KEY = 'card-english-data';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ cards, folders, nextId, nextFolderId }));
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      cards = (d.cards || []).map(c => ({ ...c, folderId: c.folderId || null }));
      folders = d.folders || [];
      nextId = d.nextId || (cards.length ? Math.max(...cards.map(c=>c.id))+1 : 10);
      nextFolderId = d.nextFolderId || (folders.length ? Math.max(...folders.map(f=>f.id))+1 : 1);
    } else {
      // first run seed
      cards = [
        { id:1, en:'Serendipity', ph:'/ˌserənˈdɪpɪti/', zh:'意外发现美好事物的能力', tag:'n.', color:'#6c63ff', status:'new', folderId:null },
        { id:2, en:'Ephemeral',   ph:'/ɪˈfemərəl/',     zh:'短暂的，转瞬即逝的',     tag:'adj.', color:'#ff6584', status:'learning', folderId:null },
        { id:3, en:'Resilient',   ph:'/rɪˈzɪliənt/',    zh:'有弹性的，能迅速恢复的', tag:'adj.', color:'#43c59e', status:'known',    folderId:null },
        { id:4, en:'Eloquent',    ph:'/ˈeləkwənt/',     zh:'雄辩的，有说服力的',     tag:'adj.', color:'#f7a541', status:'new',      folderId:null },
        { id:5, en:'Nostalgia',   ph:'/nɒˈstældʒə/',   zh:'对过去的怀念，怀旧情绪', tag:'n.',   color:'#5bc8f5', status:'learning', folderId:null },
        { id:6, en:'Pragmatic',   ph:'/præɡˈmætɪk/',   zh:'务实的，实用主义的',     tag:'adj.', color:'#e47adb', status:'new',      folderId:null },
      ];
      folders = [];
      nextId = 10; nextFolderId = 1;
      save();
    }
  } catch(e) {
    cards = []; folders = []; nextId = 10; nextFolderId = 1;
  }
}

function lookupPhonetic(word) {
  return PHONETIC_DICT[word.toLowerCase().trim()] || null;
}

function onWordInput() {
  const word = document.getElementById('m-en').value.trim();
  const statusEl = document.getElementById('ph-status');
  const phEl = document.getElementById('m-ph');
  if (!word) { if(statusEl) statusEl.textContent=''; return; }
  const ph = lookupPhonetic(word);
  if (ph) {
    phEl.value = ph;
    if(statusEl){ statusEl.textContent='✓ 已自动填入'; statusEl.style.color='#43c59e'; }
  } else {
    phEl.value = '';
    if(statusEl){ statusEl.textContent='未收录，可手动输入'; statusEl.style.color='var(--muted)'; }
  }
}

function onCardWordInput(id) {
  const word = document.getElementById(`edit-en-${id}`)?.value.trim();
  const phEl = document.getElementById(`edit-ph-${id}`);
  const statusEl = document.getElementById(`card-ph-status-${id}`);
  if (!word || !phEl) return;
  const ph = lookupPhonetic(word);
  if (ph) {
    phEl.value = ph;
    if(statusEl){ statusEl.textContent='✓'; }
    setTimeout(()=>{ if(statusEl) statusEl.textContent=''; }, 1500);
  } else {
    if(statusEl){ statusEl.textContent='?'; }
    setTimeout(()=>{ if(statusEl) statusEl.textContent=''; }, 1500);
  }
}

// ── HELPERS ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function darken(hex,a){ let c=hex.replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join(''); const r=Math.max(0,parseInt(c.slice(0,2),16)-a),g=Math.max(0,parseInt(c.slice(2,4),16)-a),b=Math.max(0,parseInt(c.slice(4,6),16)-a); return `rgb(${r},${g},${b})`; }

function visibleCards() {
  return cards.filter(c => {
    const viewOk = currentView === 'all' ? true : c.folderId === currentView;
    const statusOk = currentStatus === 'all' ? true : c.status === currentStatus;
    return viewOk && statusOk;
  });
}

// ── SIDEBAR RENDER ──
function renderSidebar() {
  const list = document.getElementById('folder-list');
  list.innerHTML = '';
  folders.forEach(f => {
    const count = cards.filter(c => c.folderId === f.id).length;
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentView === f.id ? ' active' : '');
    item.dataset.view = f.id;
    item.innerHTML = `
      <span class="folder-dot" style="background:${f.color}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      <span class="count">${count}</span>
      <div class="folder-actions">
        <button class="folder-action-btn" title="重命名" onclick="openFolderModal(${f.id});event.stopPropagation()">✏️</button>
        <button class="folder-action-btn del" title="删除" onclick="deleteFolder(${f.id});event.stopPropagation()">✕</button>
      </div>
    `;
    item.onclick = () => switchView(f.id, item);
    list.appendChild(item);
  });

  document.getElementById('count-all').textContent = cards.length;
}

// ── TOPBAR RENDER ──
function renderTopbar() {
  if (currentView === 'all') {
    document.getElementById('view-title').textContent = '全部单词';
    document.getElementById('view-sub').innerHTML = `共 <b id="total-count">${cards.length}</b> 张`;
  } else {
    const f = folders.find(f => f.id === currentView);
    const cnt = cards.filter(c => c.folderId === currentView).length;
    document.getElementById('view-title').textContent = f ? f.name : '文件夹';
    document.getElementById('view-sub').innerHTML = `共 <b>${cnt}</b> 张`;
  }
}

// ── CARD GRID RENDER ──

  renderSidebar();
  renderTopbar();
  const grid = document.getElementById('grid');
  const visible = visibleCards();
  grid.innerHTML = '';

  if (visible.length === 0) {
    grid.innerHTML = '<div class="empty"><div style="font-size:36px">📭</div><p>暂无单词，点击右上角添加吧！</p></div>';

    addEl.style.gridColumn = '1/-1';
    grid.appendChild(addEl);

  visible.forEach(card => {
    const folder = folders.find(f => f.id === card.folderId);
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';

    wrapper.innerHTML = `

              <input class="inline-input sm" placeholder="音标（自动）" value="${esc(card.ph)}" id="edit-ph-${card.id}">

          <!-- STATUS STRIP -->
          <div class="status-strip" onclick="event.stopPropagation()">
            <button class="status-btn s-new ${card.status==='new'?'cur':''}" onclick="setStatus(${card.id},'new',event)">新词</button>
            <button class="status-btn s-learning ${card.status==='learning'?'cur':''}" onclick="setStatus(${card.id},'learning',event)">学习中</button>
            <button class="status-btn s-known ${card.status==='known'?'cur':''}" onclick="setStatus(${card.id},'known',event)">已掌握</button>
          </div>
        </div>
        <!-- BACK -->
        <div class="card-face card-back">
          ${folder ? `<div class="card-folder-label">📁 ${esc(folder.name)}</div>` : ''}
          <div class="card-display">
            <div class="card-zh">${esc(card.zh)}</div>
            ${card.tag ? `<div class="card-tag">${esc(card.tag)}</div>` : ''}
          </div>
          <div class="edit-overlay">
            <input class="inline-input inline-input-zh" placeholder="中文释义" value="${esc(card.zh)}" id="edit-zh-${card.id}">
            <input class="inline-input inline-input-zh sm" placeholder="词性 e.g. n." value="${esc(card.tag)}" id="edit-tag-${card.id}">
            <button class="save-btn save-btn-zh" onclick="saveBack(${card.id},event)">✓ 保存</button>
          </div>
        </div>
      </div>
      <!-- ACTIONS -->
      <div class="card-actions">
        <button class="icon-btn edit" title="编辑" onclick="editCard(${card.id},event)">✏️</button>
        <button class="icon-btn del"  title="删除" onclick="deleteCard(${card.id},event)">✕</button>
      </div>
    `;

    wrapper.addEventListener('click', e => {
      if (e.target.closest('.icon-btn') || e.target.closest('.edit-overlay') || e.target.closest('input') || e.target.closest('.status-strip')) return;
      document.getElementById(`card-${card.id}`).classList.toggle('flipped');
    });

    grid.appendChild(wrapper);
  });

  // add placeholder
  const addEl = document.createElement('div');
  addEl.className = 'card-add';
  addEl.innerHTML = '<div class="card-add-icon">+</div><span>添加单词</span>';
  addEl.onclick = openAddModal;
  grid.appendChild(addEl);
}

// ── STATUS QUICK SET ──
function setStatus(id, status, e) {
  e.stopPropagation();
  const card = cards.find(c => c.id === id);
  if (!card) return;
  card.status = status;
  save();
  render();
}

// ── VIEW SWITCH ──
function switchView(view, el) {
  currentView = view;
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

function filterStatus(status, btn) {
  currentStatus = status;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── EDIT ──
function editCard(id, e) {
  e.stopPropagation();
  const cardEl = document.getElementById(`card-${id}`);
  const isFlipped = cardEl.classList.contains('flipped');
  const face = isFlipped ? cardEl.querySelector('.card-back') : cardEl.querySelector('.card-front');
  face.classList.toggle('editing');
  if (face.classList.contains('editing')) {
    const inputId = isFlipped ? `edit-zh-${id}` : `edit-en-${id}`;
    setTimeout(() => document.getElementById(inputId)?.focus(), 50);
  }
}

function saveFront(id, e) {
  e.stopPropagation();
  const card = cards.find(c => c.id === id);
  card.en = document.getElementById(`edit-en-${id}`).value.trim() || card.en;
  card.ph = document.getElementById(`edit-ph-${id}`).value.trim();
  save(); render();
}

function saveBack(id, e) {
  e.stopPropagation();
  const card = cards.find(c => c.id === id);
  card.zh  = document.getElementById(`edit-zh-${id}`).value.trim() || card.zh;
  card.tag = document.getElementById(`edit-tag-${id}`).value.trim();
  save(); render();
  setTimeout(() => { document.getElementById(`card-${id}`)?.classList.add('flipped'); }, 30);
}

function deleteCard(id, e) {
  e.stopPropagation();
  if (!confirm('确定删除这张卡片？')) return;
  cards = cards.filter(c => c.id !== id);
  save(); render();
}

// ── ADD WORD MODAL ──
function buildColorPicker() {
  const el = document.getElementById('color-picker');
  el.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
    s.style.background = c;
    s.onclick = () => {
      selectedColor = c;
      document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
    };
    el.appendChild(s);
  });
}

function populateFolderSelect(selectId, includeNone=true) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  sel.innerHTML = '';
  if (includeNone) {
    const opt = document.createElement('option');
    opt.value = ''; opt.textContent = '（无文件夹）';
    sel.appendChild(opt);
  }
  folders.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.id; opt.textContent = f.name;
    if (currentView === f.id) opt.selected = true;
    sel.appendChild(opt);
  });
}

function openAddModal() {
  buildColorPicker();
  selectedColor = COLORS[nextId % COLORS.length];
  buildColorPicker();
  ['m-en','m-ph','m-zh','m-tag'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  const st = document.getElementById('ph-status');
  if(st) { st.textContent=''; }
  populateFolderSelect('m-folder');
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => document.getElementById('m-en').focus(), 100);
}

function addCard() {
  const en = document.getElementById('m-en').value.trim();
  const zh = document.getElementById('m-zh').value.trim();
  if (!en || !zh) { alert('英文单词和中文释义为必填项'); return; }
  const folderVal = document.getElementById('m-folder').value;
  cards.push({
    id: nextId++,
    en, ph: document.getElementById('m-ph').value.trim(),
    zh, tag: document.getElementById('m-tag').value.trim(),
    color: selectedColor, status: 'new',
    folderId: folderVal ? Number(folderVal) : null,
  });
  save(); closeModal('modal-add'); render();
}

// ── FOLDER MODAL ──
function buildFolderColorPicker() {
  const el = document.getElementById('folder-color-picker');
  el.innerHTML = '';
  FOLDER_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'folder-color-swatch' + (c === selectedFolderColor ? ' selected' : '');
    s.style.background = c;
    s.onclick = () => {
      selectedFolderColor = c;
      document.querySelectorAll('.folder-color-swatch').forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
    };
    el.appendChild(s);
  });
}

function openFolderModal(folderId) {
  editingFolderId = folderId || null;
  const titleEl = document.getElementById('folder-modal-title');
  const confirmBtn = document.getElementById('folder-confirm-btn');
  const nameEl = document.getElementById('f-name');

  if (editingFolderId) {
    const f = folders.find(f => f.id === editingFolderId);
    titleEl.textContent = '✏️ 编辑文件夹';
    confirmBtn.textContent = '保存';
    nameEl.value = f ? f.name : '';
    selectedFolderColor = f ? f.color : FOLDER_COLORS[0];
  } else {
    titleEl.textContent = '📁 新建文件夹';
    confirmBtn.textContent = '创建';
    nameEl.value = '';
    selectedFolderColor = FOLDER_COLORS[nextFolderId % FOLDER_COLORS.length];
  }
  buildFolderColorPicker();
  document.getElementById('modal-folder').classList.add('open');
  setTimeout(() => nameEl.focus(), 100);
}

function confirmFolder() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('请输入文件夹名称'); return; }
  if (editingFolderId) {
    const f = folders.find(f => f.id === editingFolderId);
    if (f) { f.name = name; f.color = selectedFolderColor; }
  } else {
    folders.push({ id: nextFolderId++, name, color: selectedFolderColor });
  }
  save(); closeModal('modal-folder'); render();
}

function deleteFolder(id) {
  if (!confirm('删除文件夹后，其中的单词将移回「全部」，确定吗？')) return;
  folders = folders.filter(f => f.id !== id);
  cards.forEach(c => { if (c.folderId === id) c.folderId = null; });
  if (currentView === id) currentView = 'all';
  save(); render();
  // update sidebar active
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  document.querySelector('[data-view="all"]')?.classList.add('active');
}

// ── BATCH MODAL ──
function openBatchModal() {
  batchSelected = new Set();
  const grid = document.getElementById('batch-grid');
  grid.innerHTML = '';
  cards.forEach(card => {
    const item = document.createElement('div');
    item.className = 'batch-card-item';
    item.dataset.id = card.id;
    item.innerHTML = `
      <div class="batch-card-color" style="background:${card.color}"></div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(card.en)}</span>
      <span style="font-size:10px;color:var(--muted)">${STATUS_LABELS[card.status]||''}</span>
    `;
    item.onclick = () => {
      if (batchSelected.has(card.id)) {
        batchSelected.delete(card.id);
        item.classList.remove('selected');
      } else {
        batchSelected.add(card.id);
        item.classList.add('selected');
      }
    };
    grid.appendChild(item);
  });
  populateFolderSelect('batch-target-folder', false);
  // add "无文件夹" option at top
  const sel = document.getElementById('batch-target-folder');
  const opt = document.createElement('option');
  opt.value = ''; opt.textContent = '（移出文件夹）';
  sel.insertBefore(opt, sel.firstChild);

  document.getElementById('modal-batch').classList.add('open');
}

function toggleSelectAll() {
  const allIds = cards.map(c => c.id);
  if (batchSelected.size === allIds.length) {
    batchSelected = new Set();
    document.querySelectorAll('.batch-card-item').forEach(el => el.classList.remove('selected'));
  } else {
    batchSelected = new Set(allIds);
    document.querySelectorAll('.batch-card-item').forEach(el => el.classList.add('selected'));
  }
}

function executeBatchMove() {
  if (batchSelected.size === 0) { alert('请先选择要移动的单词'); return; }
  const val = document.getElementById('batch-target-folder').value;
  const targetId = val ? Number(val) : null;
  cards.forEach(c => { if (batchSelected.has(c.id)) c.folderId = targetId; });
  save(); closeModal('modal-batch'); render();
}

// ── CLOSE MODAL ──
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// backdrop click
['modal-add','modal-folder','modal-batch'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === document.getElementById(id)) closeModal(id);
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') ['modal-add','modal-folder','modal-batch'].forEach(closeModal);
  if (e.key === 'Enter') {
    if (document.getElementById('modal-add').classList.contains('open')) addCard();
    if (document.getElementById('modal-folder').classList.contains('open')) confirmFolder();
  }
});

// ── INIT ──
load();
render();
</script>
</body>
</html>
